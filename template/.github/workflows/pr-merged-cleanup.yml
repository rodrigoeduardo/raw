name: PR merged cleanup

on:
  pull_request:
    types: [closed]

permissions:
  issues: write

jobs:
  remove-in-review-label:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Remove status:in-review from closed issues
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const keywordRe = /\b(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#(\d+)/gi;
            const issueNumbers = new Set();
            let match;
            while ((match = keywordRe.exec(body)) !== null) {
              issueNumbers.add(Number(match[2]));
            }

            for (const issueNumber of issueNumbers) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: "status:in-review",
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }
